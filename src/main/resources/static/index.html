<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPEVA Home</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* === STAGE ===
       Locks layout to SVG aspect ratio (1440 × 810 → 16:9)
       All hotspots are positioned relative to this box
    */
    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
    }

    .stage img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
      pointer-events: none;
    }

    /* === GENERIC HOTSPOT === */
    .hotspot {
      position: absolute;
      z-index: 5;
      border-radius: 6%;
      background: rgba(255,255,255,0);
      text-decoration: none;
    }

    /* Optional visual feedback */
    .hotspot:hover {
      /* outline: 3px solid rgba(102,126,234,0.7); */
      background: rgba(3, 166, 241, 0.514);
      box-shadow: 0 0 1.2vmin 0.35vmin rgba(0,0,0,0.85);
      cursor: pointer;
    }

    /* === HOTSPOT POSITIONS (percent of SVG) === */

    /* Left / Top */
    .demo5 {
      left: 6.5%;
      top: 7.6%;
      width: 18.4%;
      height: 9.8%;
    }

    /* Left / Middle */
    .demo4 {
      left: 3.4%;
      top: 40.2%;
      width: 18.6%;
      height: 10.1%;
    }

    /* Center stack */
    .demo1 {
      left: 28.1%;
      top: 40.0%;
      width: 18.7%;
      height: 16.4%;
    }

    .demo2 {
      left: 28.1%;
      top: 60.2%;
      width: 18.7%;
      height: 11.4%;
    }

    .demo3 {
      left: 28.1%;
      top: 74.3%;
      width: 18.6%;
      height: 10.0%;
    }

    /* Right column */
    .demo6_8 {
      /* YOUR ADJUSTED VALUES */
      left: 71.6%;
      top: 10.2%;
      width: 26%;
      height: 11.5%;
    }

    .demo7 {
      left: 71.9%;
      top: 26.0%;
      width: 26.2%;
      height: 10.1%;
    }

    .demo9 {
      left: 71.9%;
      top: 40.2%;
      width: 26.1%;
      height: 10.1%;
    }
  </style>
</head>

<body>
  <div class="stage">
    <img src="Demo_fig.svg" alt="OPEVA Home" />
    <div class="overlay" aria-hidden="true"></div>

    <!-- HOTSPOTS -->
    <a class="hotspot demo5"   href="demo5.html"   aria-label="Open Demo 5"></a>
    <a class="hotspot demo4"   href="demo4.html"   aria-label="Open Demo 4"></a>

    <a class="hotspot demo1"   href="demo1.html"   aria-label="Open Demo 1"></a>
    <a class="hotspot demo2"   href="demo2.html"   aria-label="Open Demo 2"></a>
    <a class="hotspot demo3"   href="demo3.html"   aria-label="Open Demo 3"></a>

    <a class="hotspot demo6_8" href="demo6_8.html" aria-label="Open Demo 6 and 8"></a>
    <a class="hotspot demo7"   href="demo7.html"   aria-label="Open Demo 7"></a>
    <a class="hotspot demo9"   href="demo9.html"   aria-label="Open Demo 9"></a>
  </div>
</body>
</html>
