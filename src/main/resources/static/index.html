<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPEVA Home</title>
  <style>
    html, body { height: 100%; }
    body{
      margin:0;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display:grid;
      place-items:center;
      background:#000; /* behind the stage */
    }

    /* Stage keeps the SAME aspect ratio as the SVG, so hotspot mapping stays correct */
    .stage{
      position:relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
    }

    .stage img{
      width:100%;
      height:100%;
      display:block;
    }

    .overlay{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0.18);
      pointer-events:none;
    }

    /* Scalable clickable region (hotspot) */
    .demo-button{
      position:absolute;

      /* Demo 6&8 box coordinates (percent of the SVG/stage) */
      left: 70.9%;
      top:  9.1%;
      width: 27.7%;
      height: 13.8%;

      border-radius: 7px;
      background: rgba(255,255,255,0);
      z-index: 5;

      /* For debugging alignment, turn this on temporarily */
      /* outline: 3px solid rgba(102,126,234,0.9); */
    }

    .demo-button:hover{
      outline: 3px solid rgba(102,126,234,0.65);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="Demo_fig.svg" alt="OPEVA Home" />
    <div class="overlay" aria-hidden="true"></div>

    <a class="demo-button"
       href="demo6_8.html"
       title="Open Demo 6 & 8"
       aria-label="Open Demo 6 and 8"></a>
  </div>
</body>
</html>
